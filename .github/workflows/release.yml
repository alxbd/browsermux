      #     signtool sign /f cert.pfx /p "${{ secrets.CODE_SIGN_PASSWORD }}" /tr http://timestamp.sectigo.com /td sha256 /fd sha256 out/BrowserMux.exe out/BrowserMux.Handler.exe
