name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Setup .NET 9
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x

      - name: Restore
        run: msbuild BrowserMux.sln /t:Restore /p:Configuration=Release /p:Platform=x64 /m /nologo /verbosity:minimal

      - name: Build
        run: msbuild BrowserMux.sln /t:Build /p:Configuration=Release /p:Platform=x64 /m /nologo /verbosity:minimal
